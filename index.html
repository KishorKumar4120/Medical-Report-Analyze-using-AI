<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Report Analyzer</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            margin-bottom: 20px;
        }
        .upload-box input[type="file"] {
            margin-bottom: 15px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .results {
            margin-top: 30px;
            display: none;
        }
        .results.show {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .status-normal {
            color: #22c55e;
            font-weight: bold;
        }
        .status-abnormal {
            color: #ef4444;
            font-weight: bold;
        }
        .summary {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .error {
            color: #ef4444;
            text-align: center;
            padding: 15px;
            background: #fee;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Medical Report Analyzer</h1>
        
        <div class="upload-box">
            <input type="file" id="fileInput" accept="image/*,.pdf">
            <br><br>
            <button id="uploadBtn" onclick="uploadAndAnalyze()">Upload & Analyze</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="results" class="results">
            <div class="summary">
                <h3>Analysis Complete</h3>
                <p id="overallAnalysis"></p>
                <p><strong>Recommendations:</strong> <span id="recommendations"></span></p>
            </div>
            
            <h3>Test Results</h3>
            <table>
                <thead>
                    <tr>
                        <th>Test Name</th>
                        <th>Value</th>
                        <th>Status</th>
                        <th>Explanation</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function uploadAndAnalyze() {
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const resultsDiv = document.getElementById('results');
            const errorDiv = document.getElementById('error');
            
            if (!fileInput.files[0]) {
                alert('Please select a file');
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Analyzing...';
            errorDiv.style.display = 'none';
            resultsDiv.classList.remove('show');

            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);

                const response = await fetch('http://127.0.0.1:8000/api/analyze-report', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Failed to analyze report. Make sure backend is running.');
                }

                const data = await response.json();
                displayResults(data);
                
                // Reset file input
                fileInput.value = '';
            } catch (error) {
                errorDiv.textContent = 'Error: ' + error.message + '. Make sure the backend server is running on port 8000.';
                errorDiv.style.display = 'block';
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload & Analyze';
            }
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const resultsBody = document.getElementById('resultsBody');
            
            document.getElementById('overallAnalysis').textContent = data.overall_analysis || '';
            document.getElementById('recommendations').textContent = data.recommendations ? data.recommendations.join(', ') : '';

            resultsBody.innerHTML = '';
            
            if (data.tests && data.tests.length > 0) {
                data.tests.forEach(test => {
                    const row = document.createElement('tr');
                    const statusClass = test.status === 'Normal' ? 'status-normal' : 'status-abnormal';
                    
                    row.innerHTML = `
                        <td>${test.name}</td>
                        <td>${test.value}</td>
                        <td class="${statusClass}">${test.status}</td>
                        <td>${test.explanation}</td>
                    `;
                    resultsBody.appendChild(row);
                });
            } else {
                resultsBody.innerHTML = '<tr><td colspan="4">No test results found. Try with a clearer image.</td></tr>';
            }

            resultsDiv.classList.add('show');
        }
    </script>
</body>
</html>
